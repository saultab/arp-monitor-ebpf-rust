name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # We need both stable (for userspace) and nightly (for eBPF)
      - name: Install Rust toolchains
        run: |
          rustup toolchain install stable
          rustup toolchain install nightly --component rust-src

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Cache cargo registry & target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      # 1. Build the eBPF bytecode first so userspace compilation succeeds
      - name: Build eBPF (debug)
        run: cargo xtask build-ebpf

      # 2. Now clippy can safely inspect the code
      - name: Clippy (userspace)
        run: cargo clippy --workspace --all-targets -- -D warnings

      # 3. And tests can safely run
      - name: Run tests (userspace)
        run: cargo test --workspace

  build-release:
    name: Build release binary
    runs-on: ubuntu-latest
    needs: [check] # Waits for checks to pass
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchains
        run: |
          rustup toolchain install stable
          rustup toolchain install nightly --component rust-src

      - name: Install bpf-linker
        run: cargo install bpf-linker

      - name: Build eBPF (release)
        run: cargo xtask build-ebpf --release

      - name: Build userspace (release)
        run: cargo build --release